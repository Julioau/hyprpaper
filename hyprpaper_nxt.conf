ipc = on
splash = false

$wall = ~/Pictures/Walls/snowyBranches.jpg

# Laptop Display (eDP-1)
# 1920x1080
wallpaper {
    monitor = desc:LG Display 0x06E2
    path = $wall
    fit_mode = span
    region_x = 12.0
    region_y = 35.0
    region_width = 34.0
    region_height = 19.0
}

# Center Dell 27" (DP-2)
# 1920x1080
wallpaper {
    monitor = desc:Dell Inc. DELL P2725HE DWWKG34
    path = $wall
    fit_mode = span
    region_x = 0.0
    region_y = 0.0
    region_width = 60.0
    region_height = 34.0
}

# Vertical Dell 23" (DP-3)
# 1080x1920
wallpaper {
    monitor = desc:Dell Inc. DELL P2319H 37FW923
    path = $wall
    fit_mode = span
    region_x = 61.0
    region_y = 0.0
    region_width = 29.0
    region_height = 51.0
}

# Fallback
wallpaper {
    monitor = 
    path = $wall
    fit_mode = cover
}
